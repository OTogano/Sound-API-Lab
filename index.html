<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <div class="showUpload" id="showUpload">

        <div class="uploadSection">
            <label>Upload audio file here:</label>
            <input type="file" id="audioFile" name="audioFile" accept="audio/*">
            <button onclick="loadFromFile()">Load file</button>
        </div>

        <div class="trackInfo">
            <p id="trackName">No file loaded</p>
        </div>

        <div class="volume">
            <label for="volumeSlider">Volume</label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
        </div>

        <div class="controls">
            <button onclick="skipBackward()">backward</button>  
            <button onclick="muteSound()">mute</button>      
            <button class="play-btn" onclick="playSound()">play</button> 
            <button onclick="pauseSound()">pause</button>  
            <button onclick="skipForward()">forward</button>  
        </div>
        <strong>
         Keyboard Shortcuts: 
        </strong>
        <p>
        m = mute, spacebar = play/pause, right arrow = skip forward, left arrow = skip backward, up arrow = volume up, down arrow = volume down
        </p>

    </div>
    <script src="script.js" async defer></script>
</body>
</html>
